<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помещения</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; color: #1f1f35; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding: 18px 14px 112px; min-height: 100vh; }
        .title { text-align: center; font-size: 24px; margin-bottom: 14px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px; border: 1px solid #fff; box-shadow: 0 12px 20px rgba(37,27,76,.15); padding: 16px; min-height: 420px; }
        .item { width: 100%; height: 62px; margin: 0 auto 12px; border: 1px solid rgba(255,255,255,.55); border-radius: 16px; font-family: inherit; font-size: 16px; box-shadow: 0 7px 0 rgba(57,42,103,.18), 0 12px 18px rgba(57,42,103,.12); }
        .item:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(57,42,103,.18), 0 8px 10px rgba(57,42,103,.12); }
        .bottom-nav-wrap { position: fixed; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); }
        .bottom-nav { width: 100%; max-width: 375px; background: rgba(239,238,252,.95); border: 1px solid #fff; border-radius: 18px; box-shadow: 0 -8px 20px rgba(37,27,76,.2); display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; padding: 8px; }
        .tab-btn { border: none; border-radius: 12px; background: transparent; min-height: 62px; font-family: inherit; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn .icon { font-size: 18px; }
        .tab-btn.active { background: #cbbafd; box-shadow: inset 0 -3px 0 rgba(53,33,102,.25); }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="title">ПОМЕЩЕНИЯ</div>
        <div class="panel">
            <div id="list" style="text-align:center;padding:30px 10px;">Загрузка...</div>
        </div>
    </div>
    <div class="bottom-nav-wrap">
        <div class="bottom-nav">
            <button class="tab-btn" id="tab-dashboard"><span class="icon">🏢</span><span>Дашборд</span></button>
            <button class="tab-btn active" id="tab-places"><span class="icon">🏠</span><span>Помещения</span></button>
            <button class="tab-btn" id="tab-workers"><span class="icon">👥</span><span>Работники</span></button>
            <button class="tab-btn" id="tab-clients"><span class="icon">🧍</span><span>Клиенты</span></button>
            <button class="tab-btn" id="tab-events"><span class="icon">📅</span><span>События</span></button>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const orgId = new URLSearchParams(window.location.search).get("org_id");
        async function loadPlaces() {
            const res = await fetch(`/api/v1/org/${orgId}/places`);
            const data = await res.json();
            const list = document.getElementById("list");
            list.innerHTML = "";
            if (!data.places.length) {
                list.innerHTML = "Помещений пока нет";
                return;
            }
            data.places.forEach((place, i) => {
                const el = document.createElement("button");
                el.className = "item";
                el.style.background = i % 2 ? "#CBE949" : "#CBBAFD";
                el.textContent = place.name;
                el.onclick = () => window.location.href = `/app/org_place_detail.html?org_id=${orgId}&place_id=${place.id}&v=2`;
                list.appendChild(el);
            });
        }
        function goTo(path) { window.location.href = `${path}?org_id=${orgId}&v=2`; }
        document.getElementById("tab-dashboard").onclick = () => goTo("/app/org_dashboard.html");
        document.getElementById("tab-places").onclick = () => goTo("/app/org_places.html");
        document.getElementById("tab-workers").onclick = () => goTo("/app/org_workers.html");
        document.getElementById("tab-clients").onclick = () => goTo("/app/org_clients.html");
        document.getElementById("tab-events").onclick = () => goTo("/app/org_events.html");
        loadPlaces();
    </script>
</body>
</html>
