<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет клиента</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Russo One', sans-serif;
    min-height: 100vh;
    background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%);
    color: #1f1f35;
    padding: 18px 14px 100px;
}

.container {
    max-width: 375px;
    margin: 0 auto;
}

/* Верхняя панель */
.topbar {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
    position: relative;
}

.back-btn {
    position: absolute;
    left: 0;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.75);
    background: rgba(255, 255, 255, 0.7);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 5px 10px rgba(32, 21, 70, 0.12);
}

.page-title {
    flex: 1;
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.5px;
    opacity: 0.75;
}

/* Карточка с названием */
.name-card {
    background: #efeefc;
    border-radius: 22px;
    border: 1px solid #ffffff;
    box-shadow: 0 12px 24px rgba(37, 27, 76, 0.16);
    padding: 18px 16px;
    margin-bottom: 12px;
}

.name-title {
    font-size: 24px;
    text-transform: uppercase;
    margin-bottom: 10px;
}

.name-desc {
    font-size: 12px;
    opacity: 0.72;
    line-height: 1.4;
}

/* Секция записей */
.bookings-section {
    background: #efeefc;
    border-radius: 22px;
    border: 1px solid #ffffff;
    box-shadow: 0 12px 24px rgba(37, 27, 76, 0.16);
    padding: 18px 16px;
    margin-bottom: 12px;
}

.bookings-label {
    font-size: 20px;
    text-align: center;
    margin-bottom: 12px;
    text-transform: uppercase;
}

/* Отдельная запись */
.booking-item {
    background: #ffffff;
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 12px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
}

/* Пагинация */
.pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
}

.page-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #cbe949;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

.page-info {
    font-size: 11px;
    opacity: 0.7;
}

/* Кнопка выхода */
.leave-btn {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(140deg, #e57373, #ef9a9a);
    color: #1f1f35;
    font-family: inherit;
    font-size: 12px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(183, 28, 28, 0.18), 0 10px 14px rgba(183, 28, 28, 0.12);
    margin-bottom: 12px;
}

.leave-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 rgba(183, 28, 28, 0.18), 0 7px 9px rgba(183, 28, 28, 0.12);
}

/* Нижняя навигация */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(239, 238, 252, 0.95);
    border-top: 1px solid #ffffff;
    box-shadow: 0 -8px 20px rgba(37, 27, 76, 0.2);
    display: flex;
    justify-content: space-around;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    backdrop-filter: blur(3px);
}

.nav-btn {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: inherit;
    font-size: 10px;
    transition: all 0.12s ease;
}

.nav-btn .icon {
    font-size: 18px;
}

.nav-btn.active {
    background: #cbbafd;
    box-shadow: inset 0 -3px 0 rgba(53, 33, 102, 0.25);
}
    </style>
</head>
<body>
    <div class="container">
    <!-- Верхняя панель -->
    <div class="topbar">
        <button class="back-btn" id="backBtn">←</button>
        <div class="page-title">КАБИНЕТ КЛИЕНТА</div>
    </div>

    <!-- Карточка с названием организации -->
    <div class="name-card">
        <div class="name-title" id="orgName">НАЗВАНИЕ</div>
        <div class="name-desc">
            Регистрируйтесь на события, следите за обновлениями и оставляйте отзывы в одном месте.
        </div>
    </div>

    <!-- Секция записей -->
    <div class="bookings-section">
        <div class="bookings-label">МОИ ЗАПИСИ</div>

        <!-- Список записей -->
        <div id="bookingsList">
            <div class="booking-item">
                25.04, 12:00-12:40 • Йога • Основной зал
            </div>
            <div class="booking-item">
                25.04, 12:00-12:40 • Йога • Основной зал
            </div>
            <div class="booking-item">
                25.04, 12:00-12:40 • Йога • Основной зал
            </div>
            <div class="booking-item">
                25.04, 12:00-12:40 • Йога • Основной зал
            </div>
        </div>

        <!-- Пагинация -->
        <div class="pagination">
            <button class="page-btn" id="prevPage">←</button>
            <div class="page-info">СТРАНИЦА 1/3</div>
            <button class="page-btn" id="nextPage">→</button>
        </div>
    </div>

    <!-- Кнопка выхода -->
    <button class="leave-btn" id="leaveBtn">
        Покинуть организацию
    </button>
</div>

<!-- Нижняя навигация -->
<nav class="bottom-nav">
    <button class="nav-btn active" id="navHome">
        <span class="icon">🏠</span>
        <span>Главная</span>
    </button>
    <button class="nav-btn" id="navBookings">
        <span class="icon">📅</span>
        <span>Записи</span>
    </button>
</nav>
</body>
</html>
