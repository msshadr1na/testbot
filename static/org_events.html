<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мероприятия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding: 20px 0; }
        .title { text-align: center; font-size: 24px; margin-bottom: 18px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px; padding: 24px; }
        .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 10px; }
        .btn { width: 100%; height: 56px; border: none; border-radius: 16px; font-family: inherit; cursor: pointer; margin-top: 10px; background:#FFFFFF; border:1px solid #E0E0E0; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="title">МЕРОПРИЯТИЯ</div>
        <div class="panel">
            <div class="card" id="summary">Загрузка...</div>
            <div class="card" id="days"></div>
            <button class="btn" id="back-btn">Назад</button>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const orgId = new URLSearchParams(window.location.search).get("org_id");
        async function loadSummary() {
            const res = await fetch(`/api/v1/org/${orgId}/events/summary`);
            const data = await res.json();
            document.getElementById("summary").innerHTML =
                `Тренировок на 30 дней: ${data.upcoming_count}<br><br>Активных дней: ${data.days_with_trainings}`;
            const days = data.days.map(d => `${d.date}: ${d.count}`).join("<br>");
            document.getElementById("days").innerHTML = days || "Ближайших тренировок нет";
        }
        document.getElementById("back-btn").onclick = () => window.location.href = `/app/org_dashboard.html?org_id=${orgId}`;
        loadSummary();
    </script>
</body>
</html>
