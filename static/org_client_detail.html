<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиент</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding: 20px 0; }
        .panel { background: #EFEEFC; border-radius: 20px; padding: 24px; }
        .title { text-align: center; font-size: 24px; margin-bottom: 18px; }
        .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .btn { width: 100%; height: 56px; border: none; border-radius: 16px; font-family: inherit; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="title">КЛИЕНТ</div>
        <div class="panel">
            <div class="card" id="card">Загрузка...</div>
            <button class="btn" style="background:#CBBAFD;" id="delete-btn">Удалить клиента</button>
            <button class="btn" style="background:#FFFFFF;border:1px solid #E0E0E0;" id="back-btn">Назад</button>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const params = new URLSearchParams(window.location.search);
        const orgId = params.get("org_id");
        const clientId = params.get("client_id");
        const card = document.getElementById("card");

        async function loadDetail() {
            const res = await fetch(`/api/v1/org/${orgId}/clients/${clientId}`);
            const data = await res.json();
            card.innerHTML = `Имя: ${data.full_name}<br><br>Телефон: ${data.phone || "не указан"}`;
        }

        document.getElementById("delete-btn").onclick = async () => {
            if (!confirm("Удалить клиента из организации?")) return;
            const res = await fetch(`/api/v1/org/${orgId}/clients/${clientId}`, { method: "DELETE" });
            if (res.ok) window.location.href = `/app/org_clients.html?org_id=${orgId}`;
        };
        document.getElementById("back-btn").onclick = () => window.location.href = `/app/org_clients.html?org_id=${orgId}`;
        loadDetail();
    </script>
</body>
</html>
