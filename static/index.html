<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmmBot — Управление</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 375px;
            height: 812px;
            font-family: 'Russo One', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-gradient {
            width: 375px;
            height: 812px;
            background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            position: absolute;
            top: 0;
            left: 0;
        }

        .welcome-container {
            position: absolute;
            width: 313px;
            left: 31px;
            top: 40px;
            text-align: left;
        }

        .welcome-line-1 {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
            margin-bottom: 4px;
        }

        .welcome-line-2 {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #7A23B8;
        }

        .content {
            position: absolute;
            width: 375px;
            height: 685px;
            left: 0;
            top: 127px;
            background: #FFFFFF;
            border-radius: 20px 20px 0 0;
            padding-top: 50px;
        }

        /* 🔥 Обновлённый стиль для "ВОЙТИ КАК" — градиентная рамка с закруглёнными углами */
        .login-label-wrapper {
            position: absolute;
            width: 166px;
            height: 66px;
            left: 105px;
            top: 25px; /* изменить при необходимости */
            border-radius: 20px;
            background: linear-gradient(127.42deg, #CBBAFD, #CBE949);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px; /* толщина рамки */
            box-sizing: border-box;
        }

        .login-label {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000; /* 🔶 Текст — чёрный */
            background: #FFFFFF; /* белый фон внутри */
            border-radius: 17px; /* 20px - 3px padding */
            text-align: center;
            box-sizing: border-box;
        }

        .button {
            position: absolute;
            width: 313px;
            height: 70px;
            left: 31px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
        }

        .btn-organizer {
            top: 111px;
            background: #CBBAFD;
        }

        .btn-worker {
            top: 201px;
            background: #CBE949;
        }

        .btn-client {
            top: 291px;
            background: #CBBAFD;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="bg-gradient">
        <div class="welcome-container">
            <div class="welcome-line-1">ДОБРО ПОЖАЛОВАТЬ,</div>
            <div class="welcome-line-2" id="username">ИМЯ ФАМИЛИЯ</div>
        </div>
    </div>

    <div class="content">
        <!-- 🔥 Новый элемент — градиентная рамка -->
        <div class="login-label-wrapper">
            <div class="login-label">ВОЙТИ КАК</div>
        </div>
        <button class="button btn-organizer" onclick="alert('Выбрано: Организатор')">
            ОРГАНИЗАТОР
        </button>
        <button class="button btn-worker" onclick="alert('Выбрано: Работник')">
            РАБОТНИК
        </button>
        <button class="button btn-client" onclick="alert('Выбрано: Клиент')">
            КЛИЕНТ
        </button>
    </div>

    <div class="footer">
        © mmmBot 2026
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').textContent = `${user.first_name} ${user.last_name || ''}`;
        }
    </script>
</body>
</html>
