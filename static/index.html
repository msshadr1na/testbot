<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Управление организацией</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h2>Web App готов</h2>
    <div id="data"></div>

    <script>
    const tg = Telegram.WebApp;
    tg.ready();

    fetch('/api/v1/org/1/schedule')
      .then(r => r.json())
      .then(data => {
        document.getElementById('data').innerText = JSON.stringify(data, null, 2);
      });
    </script>
</body>
</html>
