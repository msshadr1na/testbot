<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>mmmBot — Управление</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Russo One', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .bg-gradient
        {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(120.42deg, #CBBAFD 30.38%, #CBE949 55.67%);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        .container
        {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            position: relative;
            padding-top: 20px;
        }

        .welcome-container {
            position: relative;
            width: 313px;
            left: 31px;
            top: 33px;
            text-align: left;
        }

        .welcome-line-1 {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
            margin-bottom: 4px;
        }

        .welcome-line-2 {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #7A23B8;
        }

        .content {
            position: relative;
            width: 100%;
            height: 685px;
            top: 60px;
            background: #FFFFFF;
            border-radius: 20px 20px 20px 20px;
            padding-top: 50px;
        }

        .login-label-wrapper {
            position: absolute;
            width: 166px;
            height: 66px;
            left: 105px;
            top: 25px;
            border-radius: 20px;
            background: linear-gradient(127.42deg, #CBBAFD, #CBE949);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
            box-sizing: border-box;
        }

        .login-label {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
            background: #FFFFFF;
            border-radius: 17px;
            text-align: center;
            box-sizing: border-box;
        }

        .button {
            position: absolute;
            width: 313px;
            height: 70px;
            left: 31px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
        }

        .btn-organizator {
            top: 111px;
            background: #CBBAFD;
            box-shadow: 0 6px 0 #9B7FCC;
        }
        .btn-organizator:hover
        {
            transform: scale(1.02);
            box-shadow: 0 6px 0 #9B7FCC,
            0 15px 6px rgba(0, 0, 0, 0.3);
        }
        .btn-organizator:active
        {
            transform: translateY(0);
            box-shadow: 0 6px 0 #9B7FCC;
        }


        .btn-worker {
            top: 201px;
            background: #CBE949;
            box-shadow: 0 6px 0 #9EB82E;
        }
        .btn-worker:hover
        {
            transform: scale(1.02);
            box-shadow: 0 6px 0 #9EB82E,
            0 15px 6px rgba(0, 0, 0, 0.3);
        }
        .btn-worker:active
        {
            transform: translateY(0);
            box-shadow: 0 6px 0 #9EB82E;
        }

        .btn-client
        {
            top: 291px;
            background: #CBBAFD;
            box-shadow: 0 6px 0 #9B7FCC;
        }
        .btn-client:hover
        {
            transform: scale(1.02);
            box-shadow: 0 6px 0 #9B7FCC,
            0 15px 6px rgba(0, 0, 0, 0.3);
        }
        .btn-client:active
        {
            transform: translateY(0);
            box-shadow: 0 6px 0 #9B7FCC;
        }
        .loading-hidden
        {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
        }

        .loading-visible
        {
            opacity: 1;
            visibility: visible;
        }

        #username
        {
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container">
        <div class="welcome-container">
            <div class="welcome-line-1">ДОБРО ПОЖАЛОВАТЬ,</div>
            <div class="welcome-line-2" id="username" style="opacity: 0;">ИМЯ ФАМИЛИЯ</div>
        </div>

        <div class="content">
            <div class="login-label-wrapper">
                <div class="login-label">ВОЙТИ КАК</div>
            </div>
            <button class="button btn-organizator" onclick="goToOrgs()">
                ОРГАНИЗАТОР
            </button>
            <button class="button btn-worker" onclick="goToWorkerOrgs()">
                РАБОТНИК
            </button>
            <button class="button btn-client" onclick="goToClientOrgs()">
                КЛИЕНТ
            </button>
        </div>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();

        const usernameEl = document.getElementById('username');

        async function loadUserName() {
            const user = tg.initDataUnsafe?.user;

            if (!user)
            {
                usernameEl.textContent = "Гость";
                usernameEl.style.opacity = '1';
                return;
            }

            const telegramId = user.id;
            const response = await fetch(`/api/v1/get-user?telegram_id=${telegramId}`);
            const userData = await response.json();
            const name = `${userData.first_name}`.trim();
            usernameEl.textContent = name || "Гость";
            usernameEl.style.opacity = '1';
        }
        loadUserName();

        function goToOrgs() {
            window.location.href = '/orgs';
        }
        function goToWorkerOrgs() {
            window.location.href = '/worker';
        }
        function goToClientOrgs() {
            window.location.href = '/client';
        }
    </script>

</body>
</html>
