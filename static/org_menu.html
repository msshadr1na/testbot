<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выберите организацию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Russo One', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        .content {
            position: relative;
            width: 100%;
            height: 685px;
            top: 60px;
            background: #FFFFFF;
            border-radius: 20px 20px 20px 20px;
            padding-top: 50px;
        }

        .container
        {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            position: relative;
            padding-top: 20px;
        }

        .header {
            position: relative;
            width: 381px;
            top: 33px;
            text-align: center;
        }

        .header-title {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
            font-weight: 400;
        }

        .org-list-container
        {
            background: #EFEEFC;
            border-radius: 20px 20px 0 0;
            padding: 20px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .org-list
        {
            flex-grow: 1;
            padding: 0 20px;
            padding-bottom: 70px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #CBBAFD #EFEEFC;
            min-height: 326px;
        }

        .org-btn {
            width: 100%;
            max-width: 313px;
            height: 70px;
            margin: 0 auto 8px;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
            transition: all 0.25s ease;
            position: relative;
            box-sizing: border-box;
        }

        .org-btn:last-child {
            margin-bottom: 0;
        }


        .org-btn:nth-child(odd) {
            background: rgba(203, 233, 73, 0.5);
            border: 3px solid #9EB82E;
        }
        .org-btn:nth-child(even) {
            background: rgba(203, 186, 253, 0.5);
            border: 3px solid #9B7FCC;
        }

        .org-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 6px rgba(0, 0, 0, 0.15);
        }

        .org-btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .actions
        {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 15px 0 10px;
            background: #EFEEFC;

            flex-shrink: 0;
        }

        .action-btn {
            width: 313px;
            height: 56px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 18px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
            transition: all 0.2s;
        }

            .action-btn:hover {
                transform: scale(1.02);
            }

        .create-org-btn
        {
            background: #CBBAFD;
            box-shadow: 0 6px 0 #9B7FCC;
        }
        .create-org-btn:hover
        {
            transform: scale(1.02);
            box-shadow: 0 6px 0 #9B7FCC,
            0 15px 6px rgba(0, 0, 0, 0.3);
        }
        .create-org-btn:active
        {
            transform: translateY(0);
            box-shadow: 0 6px 0 #9B7FCC;
        }

        .navigation
        {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 0 20px 15px;
            background: #EFEEFC;
            flex-shrink: 0;
        }

        .nav-btn
        {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

            .nav-btn.visible {
                visibility: visible;
                opacity: 1;
                pointer-events: auto;
            }

            .nav-btn:hover {
                background: #FFFFFF;
                transform: scale(1.05);
            }

        .menu-btn
        {
            background: #CBE949;
            width: 116px;
            height: 56px;
            box-shadow: 0 6px 0 #9EB82E;
        }
        .menu-btn:hover
        {
            transform: scale(1.02);
            box-shadow: 0 6px 0 #9EB82E,
            0 15px 6px rgba(0, 0, 0, 0.3);
        }
        .menu-btn:active
        {
            transform: translateY(0);
            box-shadow: 0 6px 0 #9EB82E;
        }
        .loading-hidden
        {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
        }

        .loading-visible
        {
            opacity: 1;
            visibility: visible;
        }

        #org-list
        {
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container">
        <div class="header">
            <div class="header-title">ВЫБЕРИТЕ ОРГАНИЗАЦИЮ</div>
        </div>

        <div class="content">
            <div class="org-list-container">
                <div class="org-list" id="org-list" style="opacity: 0;">Загрузка...</div>

                <div class="actions">
                    <button class="action-btn create-org-btn" onclick="window.location.href='/app/org_create.html?v=2'">
                        Создать организацию
                    </button>
                </div>

                <div class="navigation">
                    <button class="nav-btn" id="prev-page-nav">←</button>
                    <button class="action-btn menu-btn" onclick="window.location.href = '/app'">
                        Меню
                    </button>
                    <button class="nav-btn" id="next-page-nav">→</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        if (!user) {
            document.getElementById("org-list").innerHTML =
                '<div style="text-align:center; padding:40px; color:#777;">Не удалось определить пользователя</div>';
        } else {
            const userId = user.id;

            fetch(`/api/v1/org/organizations?user_id=${userId}`)
                .then(res => {
                    return res.json();
                })
                .then(data => {
                    const container = document.getElementById("org-list");
                    container.style.opacity = '0';
                    const prevBtn = document.getElementById("prev-page-nav");
                    const nextBtn = document.getElementById("next-page-nav");

                    if (data.organizations.length === 0) {
                        container.innerHTML = `
                    <div style="
                      text-align: center;
                      padding: 40px 20px;
                      color: #555;
                      font-size: 16px;">
                      У вас нет организаций.
                    </div>`;
                        return;
                    }
                    const totalOrgs = data.organizations.length;
                    const perPage = 3;
                    let currentPage = 0;

                    function renderPage(page) {
                        container.innerHTML = '';
                        const start = page * perPage;
                        const end = Math.min(start + perPage, totalOrgs);
                        const pageOrgs = data.organizations.slice(start, end);

                        pageOrgs.forEach((org, index) => {
                            const btn = document.createElement("button");
                            btn.className = "org-btn";

                            btn.textContent = org.name.toUpperCase();

                            btn.onclick = () => {
                                localStorage.setItem("selectedOrgId", org.id);
                                window.location.href = `/app/org_main.html?org_id=${org.id}&v=2`;
                            };

                            container.appendChild(btn);
                        });

                        const hasPrev = page > 0;
                        const hasNext = page < Math.ceil(totalOrgs / perPage) - 1;

                        prevBtn.classList.toggle('visible', hasPrev);
                        nextBtn.classList.toggle('visible', hasNext);
                    }

                    nextBtn.onclick = () => {
                        if ((currentPage + 1) * perPage < totalOrgs) {
                            currentPage++;
                            renderPage(currentPage);
                        }
                    };
                    prevBtn.onclick = () => {
                        if (currentPage > 0) {
                            currentPage--;
                            renderPage(currentPage);
                        }
                    };

                    renderPage(currentPage);
                    container.style.opacity = '1';
                })
                .catch(err => {
                    document.getElementById("org-list").innerHTML = `
                  <div style="text-align:center; padding:40px; color:#d32f2f;">
                    Ошибка загрузки<br><small>${err.message}</small>
                  </div>
                  container.style.opacity = '1';
                `;
                });
        }
    </script>
</body>
</html>
