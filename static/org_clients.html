<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиенты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding: 20px 0; }
        .header-title { text-align: center; font-size: 24px; margin-bottom: 18px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px; padding: 20px 0; min-height: 400px; }
        .item { width: 313px; height: 62px; margin: 0 auto 10px; border: none; border-radius: 16px; font-family: inherit; font-size: 16px; cursor: pointer; background: #CBBAFD; }
        .actions { width: 313px; margin: 12px auto 0; display: flex; gap: 8px; }
        .small { flex: 1; height: 56px; border: none; border-radius: 16px; font-family: inherit; font-size: 12px; cursor: pointer; }
        .a1 { background: #CBE949; } .a2 { background: #FFFFFF; border: 1px solid #E0E0E0; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="header-title">КЛИЕНТЫ</div>
        <div class="panel">
            <div id="list" style="text-align:center;padding:30px 10px;">Загрузка...</div>
            <div class="actions">
                <button class="small a1" id="invite-btn">Ссылка приглашения</button>
                <button class="small a1" id="refresh-btn">Обновить ссылку</button>
                <button class="small a2" id="back-btn">Назад</button>
            </div>
            <div id="invite" style="width:313px;margin:10px auto 0;font-size:12px;word-break:break-all;"></div>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const orgId = new URLSearchParams(window.location.search).get("org_id");
        const list = document.getElementById("list");
        const inviteEl = document.getElementById("invite");

        async function loadClients() {
            const res = await fetch(`/api/v1/org/${orgId}/clients`);
            const data = await res.json();
            list.innerHTML = "";
            if (!data.clients.length) {
                list.innerHTML = "Клиентов пока нет";
                return;
            }
            data.clients.forEach((client, i) => {
                const btn = document.createElement("button");
                btn.className = "item";
                btn.style.background = i % 2 ? "#CBE949" : "#CBBAFD";
                btn.textContent = client.name;
                btn.onclick = () => window.location.href = `/app/org_client_detail.html?org_id=${orgId}&client_id=${client.id}`;
                list.appendChild(btn);
            });
        }

        async function loadInvite(refresh) {
            const method = refresh ? "POST" : "GET";
            const url = refresh
                ? `/api/v1/org/${orgId}/clients/invite/refresh`
                : `/api/v1/org/${orgId}/clients/invite`;
            const res = await fetch(url, { method });
            const data = await res.json();
            inviteEl.textContent = data.link || "";
        }

        document.getElementById("invite-btn").onclick = () => loadInvite(false);
        document.getElementById("refresh-btn").onclick = () => loadInvite(true);
        document.getElementById("back-btn").onclick = () => window.location.href = `/app/org_dashboard.html?org_id=${orgId}`;
        loadClients();
    </script>
</body>
</html>
