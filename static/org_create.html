<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать организацию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding-top: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .title { text-align: center; font-size: 24px; margin-bottom: 18px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px 20px 0 0; flex: 1; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        input { width: 100%; height: 56px; border-radius: 16px; border: 1px solid #ddd; padding: 0 12px; font-family: inherit; margin-bottom: 10px; }
        .btn { width: 100%; height: 56px; border: none; border-radius: 16px; font-family: inherit; cursor: pointer; margin-top: 10px; }
        .status { width: 100%; min-height: 20px; font-size: 13px; margin-top: 8px; color: #5a5a5a; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="title">СОЗДАТЬ ОРГАНИЗАЦИЮ</div>
        <div class="panel">
            <input id="name-input" maxlength="100" placeholder="Название организации">
            <input id="place-input" maxlength="100" placeholder="Название первого помещения">
            <button class="btn" style="background:#CBBAFD;" id="create-btn">Создать</button>
            <button class="btn" style="background:#FFFFFF;border:1px solid #E0E0E0;" id="back-btn">Назад</button>
            <div id="status" class="status"></div>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const tgId = Telegram.WebApp.initDataUnsafe?.user?.id;
        const nameInput = document.getElementById("name-input");
        const placeInput = document.getElementById("place-input");
        const statusEl = document.getElementById("status");

        function setStatus(text, isError = false) {
            statusEl.textContent = text || "";
            statusEl.style.color = isError ? "#d32f2f" : "#5a5a5a";
        }

        document.getElementById("create-btn").onclick = async () => {
            const name = nameInput.value.trim();
            const place = placeInput.value.trim();
            if (name.length < 2) return setStatus("Название организации: минимум 2 символа", true);
            if (place.length < 2) return setStatus("Название помещения: минимум 2 символа", true);
            const query = `name=${encodeURIComponent(name)}&first_place_name=${encodeURIComponent(place)}&user_id=${encodeURIComponent(tgId)}`;
            const res = await fetch(`/api/v1/org?${query}`, { method: "POST" });
            const data = await res.json();
            if (!res.ok) return setStatus(data.detail || "Не удалось создать организацию", true);
            setStatus("Организация успешно создана");
            setTimeout(() => {
                window.location.href = `/app/org_dashboard.html?org_id=${data.id}&v=2`;
            }, 700);
        };

        document.getElementById("back-btn").onclick = () => window.location.href = "/orgs";
    </script>
</body>
</html>
