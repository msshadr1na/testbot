<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работники</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding-top: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .header-title { text-align: center; font-size: 24px; margin-bottom: 18px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px 20px 0 0; flex: 1; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .list { width: 313px; flex: 1; overflow-y: auto; }
        .item { width: 313px; height: 62px; margin: 0 auto 10px; border: none; border-radius: 16px; font-family: inherit; font-size: 16px; cursor: pointer; background: #CBBAFD; }
        .actions { width: 313px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .small { height: 56px; border: none; border-radius: 16px; font-family: inherit; font-size: 12px; cursor: pointer; }
        .a1 { background: #CBE949; } .a2 { background: #FFFFFF; border: 1px solid #E0E0E0; grid-column: 1 / -1; }
        .status { width: 313px; font-size: 12px; margin-top: 8px; min-height: 16px; color: #5a5a5a; word-break: break-all; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="header-title">РАБОТНИКИ</div>
        <div class="panel">
            <div id="list" class="list" style="text-align:center;padding:30px 10px;">Загрузка...</div>
            <div class="actions">
                <button class="small a1" id="invite-btn">Ссылка приглашения</button>
                <button class="small a1" id="refresh-btn">Обновить ссылку</button>
                <button class="small a2" id="back-btn">Назад</button>
            </div>
            <div id="status" class="status"></div>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const orgId = new URLSearchParams(window.location.search).get("org_id");
        const list = document.getElementById("list");
        const statusEl = document.getElementById("status");

        function setStatus(text, isError = false) {
            statusEl.textContent = text || "";
            statusEl.style.color = isError ? "#d32f2f" : "#5a5a5a";
        }

        async function loadWorkers() {
            const res = await fetch(`/api/v1/org/${orgId}/workers`);
            const data = await res.json();
            list.innerHTML = "";
            if (!data.workers.length) {
                list.innerHTML = "Работников пока нет";
                return;
            }
            data.workers.forEach((worker, i) => {
                const btn = document.createElement("button");
                btn.className = "item";
                btn.style.background = i % 2 ? "#CBE949" : "#CBBAFD";
                btn.textContent = worker.name;
                btn.onclick = () => window.location.href = `/app/org_worker_detail.html?org_id=${orgId}&worker_id=${worker.id}`;
                list.appendChild(btn);
            });
        }

        async function loadInvite(refresh) {
            const method = refresh ? "POST" : "GET";
            const url = refresh
                ? `/api/v1/org/${orgId}/workers/invite/refresh`
                : `/api/v1/org/${orgId}/workers/invite`;
            const res = await fetch(url, { method });
            const data = await res.json();
            if (!res.ok) {
                setStatus(data.detail || "Не удалось получить ссылку", true);
                return;
            }
            setStatus(data.link || "");
        }

        document.getElementById("invite-btn").onclick = () => loadInvite(false);
        document.getElementById("refresh-btn").onclick = () => loadInvite(true);
        document.getElementById("back-btn").onclick = () => window.location.href = `/app/org_dashboard.html?org_id=${orgId}`;
        loadWorkers();
    </script>
</body>
</html>
