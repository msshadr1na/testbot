<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Организация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Russo One', sans-serif;
            min-height: 100vh;
            color: #1f1f35;
            overflow-x: hidden;
        }
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%);
            z-index: -1;
        }
        .container {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px 24px 132px;
        }
        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }
        .back-btn {
            border: none;
            background: #CBE949;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            font-size: 30px;
            font-family: inherit;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 7px 0 rgba(64, 52, 96, 0.22), 0 10px 18px rgba(26, 15, 52, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 rgba(64, 52, 96, 0.22), 0 10px 18px rgba(26, 15, 52, 0.18), 0 15px 6px rgba(26, 15, 52, 0.22);
        }
        .back-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 0 rgba(64, 52, 96, 0.22), 0 7px 12px rgba(26, 15, 52, 0.15);
        }
        .page-label {
            font-size: 16px;
            letter-spacing: 0.6px;
            opacity: 0.75;
            line-height: 1.05;
            text-align: right;
            flex: 1;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .org-card {
            background: #EFEEFC;
            border-radius: 20px;
            box-shadow: 0 7px 0 rgba(77, 67, 110, 0.24), 0 12px 20px rgba(38, 30, 67, 0.13);
            padding: 22px 18px 20px;
            margin-bottom: 18px;
        }
        .org-title {
            font-size: 27px;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 10px;
            word-break: break-word;
            color: #0b0b11;
        }
        .org-subtitle {
            font-size: 12px;
            line-height: 1.25;
            opacity: 0.72;
            letter-spacing: 0.3px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 0;
        }
        .stat-card {
            display: flex;
            flex-direction: column;
            background: #EFEEFC;
            border-radius: 20px;
            height: 94px;
            padding: 16px 18px 14px;
            box-shadow: 0 7px 0 rgba(77, 67, 110, 0.24), 0 12px 20px rgba(38, 30, 67, 0.13);
        }
        .stat-name {
            font-size: 12px;
            opacity: 0.72;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .stat-value {
            font-size: 28px;
            line-height: 1;
            color: #101018;
            margin-top: auto; /* 👈 Ключевое свойство: прижимает значение к низу */
        }
        .settings-link {
            margin-top: auto;
            width: 100%;
            min-height: 72px;
            border: none;
            border-radius: 20px;
            font-family: inherit;
            font-size: 18px;
            background: #CBBAFD;
            box-shadow: 0 6px 0 #9B7FCC;
            cursor: pointer;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .settings-link:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 0 #9B7FCC,
            0 15px 6px rgba(0, 0, 0, 0.3);
        }
        .settings-link:active {
            transform: translateY(0);
            box-shadow: 0 6px 0 #9B7FCC;
        }

        .bottom-nav-wrap {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            padding: 10px 24px calc(14px + env(safe-area-inset-bottom));
            pointer-events: none;
            z-index: 100;
        }
        .bottom-nav {
            width: 100%;
            max-width: 382px;
            background: rgba(239, 238, 252, 0.98);
            border: 1px solid #ffffff;
            border-radius: 20px;
            box-shadow: 0 -7px 18px rgba(37, 27, 76, 0.19);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding: 8px;
            pointer-events: auto;
            backdrop-filter: blur(3px);
        }
        .tab-btn {
            border: none;
            border-radius: 12px;
            background: transparent;
            min-height: 72px;
            padding: 6px 4px 4px;
            color: #231F20;
            font-family: inherit;
            font-size: 9px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background .12s ease, transform .12s ease;
            text-transform: uppercase;
            box-sizing: border-box;
            flex: 1;
        }
        .tab-btn .icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .tab-btn .icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            object-position: center;
            display: block;
        }
        .tab-btn span:last-child {
            color: #231F20;
            transition: color .12s ease;
            font-size: 9px;
            line-height: 1.1;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tab-btn:not(.active):hover {
            background: #CBBAFD;
            transform: translateY(-1px);
        }
        .tab-btn.active {
            background: #CBBAFD;
        }
        .tab-btn.active .icon img {
            filter: brightness(0) saturate(100%) invert(27%) sepia(87%) saturate(1797%) hue-rotate(253deg) brightness(84%) contrast(93%);
        }
        .tab-btn.active span:last-child {
            color: #7A23B8;
        }
        .tab-btn.active:hover
        {
            background: #BBAAEF;
        }

        /* Desktop webview can render this layout slightly oversized; match one-step browser zoom-out feel. */
        @media (min-width: 431px) and (pointer: fine) {
            body {
                zoom: 0.92;
            }
        }

        @media (max-width: 430px) {
            .container
            {
                max-width: 375px;
                padding: 18px 14px 120px;
            }
            .back-btn
            {
                width: 50px;
                height: 50px;
                border-radius: 13px;
                font-size: 22px;
            }
            .page-label { font-size: 12px; }
            .org-card
            {
                border-radius: 18px;
                padding: 16px 14px;
                margin-bottom: 14px;
            }
            .org-title { font-size: 24px; }
            .org-subtitle { font-size: 12px; }
            .stats-grid
            {
                gap: 10px;
                margin-bottom: 0;
            }
            .stat-card
            {
                border-radius: 16px;
                padding: 12px;
                height: 94px;
            }
            .stat-name
            {
                font-size: 11px;
                margin-bottom: 6px;
            }
            .stat-value { font-size: 26px; }
            .settings-link
            {
                min-height: 70px;
                border-radius: 18px;
                font-size: 16px;
            }
            .bottom-nav-wrap
            {
                padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
            }
            .bottom-nav
            {
                max-width: 347px;
                background: rgba(239,238,252,.95);
                border: 1px solid #fff;
                border-radius: 18px;
                box-shadow: 0 -8px 20px rgba(37,27,76,.2);
                gap: 2px;
                padding: 6px;
            }
            .tab-btn
            {
                min-height: 68px;
                padding: 4px 2px 3px;
                gap: 4px;
                font-size: 8px;
            }
            .tab-btn .icon
            {
                width: 32px;
                height: 32px;
            }
            .tab-btn .icon img
            {
                width: 32px;
                height: 32px;
            }
            .tab-btn span:last-child
            {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="topbar">
            <button class="back-btn" id="back-btn">←</button>
            <div class="page-label">КАБИНЕТ ОРГАНИЗАТОРА</div>
        </div>

        <div class="org-card">
            <div class="org-title" id="title">НАЗВАНИЕ</div>
            <div class="org-subtitle">Управляйте командой, клиентами и расписанием в одном месте.</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-name">Работники</div>
                <div class="stat-value" id="stat-workers">5</div>
            </div>
            <div class="stat-card">
                <div class="stat-name">Клиенты</div>
                <div class="stat-value" id="stat-clients">5</div>
            </div>
            <div class="stat-card">
                <div class="stat-name">Помещения</div>
                <div class="stat-value" id="stat-places">5</div>
            </div>
            <div class="stat-card">
                <div class="stat-name">Тренировок в этом месяце</div>
                <div class="stat-value" id="stat-trainings-month">5</div>
            </div>
        </div>

        <button class="settings-link" id="open-settings-btn">НАСТРОЙКИ</button>
    </div>

    <div class="bottom-nav-wrap">
        <div class="bottom-nav">
            <button class="tab-btn active" id="tab-dashboard">
                <span class="icon">
                    <img src="/app/icons/main.svg?v=2" alt="">
                </span>
                <span>ГЛАВНАЯ</span>
            </button>
            <button class="tab-btn" id="tab-places">
                <span class="icon">
                    <img src="/app/icons/gyms.svg?v=2" alt="">
                </span>
                <span>ПОМЕЩЕНИЯ</span>
            </button>
            <button class="tab-btn" id="tab-workers">
                <span class="icon">
                    <img src="/app/icons/workers.svg?v=2" alt="">
                </span>
                <span>РАБОТНИКИ</span>
            </button>
            <button class="tab-btn" id="tab-clients">
                <span class="icon">
                    <img src="/app/icons/clients.svg?v=2" alt="">
                </span>
                <span>КЛИЕНТЫ</span>
            </button>
            <button class="tab-btn" id="tab-events">
                <span class="icon">
                    <img src="/app/icons/events.svg?v=2" alt="">
                </span>
                <span>СОБЫТИЯ</span>
            </button>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        const params = new URLSearchParams(window.location.search);
        const orgId = params.get("org_id") || localStorage.getItem("selectedOrgId");
        if (orgId) localStorage.setItem("selectedOrgId", orgId);

        async function loadDashboardData() {
            if (!orgId) return;
            try
            {
                const now = new Date();
                const [orgRes, workersRes, clientsRes, placesRes, eventsRes] = await Promise.all(
                    [fetch(`/api/v1/org/${orgId}`),
                    fetch(`/api/v1/org/${orgId}/workers`),
                    fetch(`/api/v1/org/${orgId}/clients`),
                    fetch(`/api/v1/org/${orgId}/places`),
                    fetch(`/api/v1/org/${orgId}/events/calendar?year=${now.getFullYear()}&month=${now.getMonth() + 1}`)]);
                if (orgRes.ok)
                {
                    const orgData = await orgRes.json();
                    document.getElementById("title").textContent = String(orgData.name || "НАЗВАНИЕ").toUpperCase();
                }
                if (workersRes.ok)
                {
                    const workersData = await workersRes.json();
                    document.getElementById("stat-workers").textContent = workersData.workers?.length ?? 0;
                }
                if (clientsRes.ok)
                {
                    const clientsData = await clientsRes.json();
                    document.getElementById("stat-clients").textContent = clientsData.clients?.length ?? 0;
                }
                if (placesRes.ok)
                {
                    const placesData = await placesRes.json();
                    document.getElementById("stat-places").textContent = placesData.places?.length ?? 0;
                }
                if (eventsRes.ok)
                {
                    const eventsData = await eventsRes.json();
                    const total = (eventsData.days || []).reduce((sum, d) => sum + (d.count || 0), 0);
                    document.getElementById("stat-trainings-month").textContent = total;
                }
            } catch (error) {}
        }

        function goTo(path)
        {
            if (!orgId) return;
            window.location.href = `${path}?org_id=${orgId}&v=2`;
        }

        document.getElementById("back-btn").onclick = () => window.location.href = "/orgs";
        document.getElementById("open-settings-btn").onclick = () => goTo("/app/org_settings.html");
        document.getElementById("tab-dashboard").onclick = () => goTo("/app/org_main.html");
        document.getElementById("tab-places").onclick = () => goTo("/app/org_places.html");
        document.getElementById("tab-workers").onclick = () => goTo("/app/org_workers.html");
        document.getElementById("tab-clients").onclick = () => goTo("/app/org_clients.html");
        document.getElementById("tab-events").onclick = () => goTo("/app/org_events.html");

        loadDashboardData();
    </script>
</body>
</html>
