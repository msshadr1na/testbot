<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки организации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding-top: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .title { text-align: center; font-size: 24px; margin-bottom: 18px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px 20px 0 0; flex: 1; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        input { width: 100%; height: 56px; border-radius: 16px; border: 1px solid #ddd; padding: 0 12px; font-family: inherit; margin-bottom: 10px; }
        .btn { width: 100%; height: 56px; border: none; border-radius: 16px; font-family: inherit; cursor: pointer; margin-top: 10px; }
        .status { width: 100%; min-height: 20px; font-size: 13px; margin-top: 8px; color: #5a5a5a; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="title">НАСТРОЙКИ</div>
        <div class="panel">
            <input id="name-input" maxlength="100" placeholder="Новое название организации">
            <button class="btn" style="background:#CBBAFD;" id="save-btn">Сохранить название</button>
            <button class="btn" style="background:#F8CECC;" id="delete-btn">Удалить организацию</button>
            <button class="btn" style="background:#FFFFFF;border:1px solid #E0E0E0;" id="back-btn">Назад</button>
            <div id="status" class="status"></div>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const params = new URLSearchParams(window.location.search);
        const orgId = params.get("org_id");
        const tgId = Telegram.WebApp.initDataUnsafe?.user?.id;
        const input = document.getElementById("name-input");
        const statusEl = document.getElementById("status");

        function setStatus(text, isError = false) {
            statusEl.textContent = text || "";
            statusEl.style.color = isError ? "#d32f2f" : "#5a5a5a";
        }

        async function loadOrg() {
            const res = await fetch(`/api/v1/org/${orgId}`);
            const data = await res.json();
            input.value = data.name || "";
        }

        document.getElementById("save-btn").onclick = async () => {
            const name = input.value.trim();
            if (name.length < 2) {
                setStatus("Название должно быть не короче 2 символов", true);
                return;
            }
            const res = await fetch(`/api/v1/org/${orgId}?name=${encodeURIComponent(name)}`, { method: "PUT" });
            const data = await res.json();
            if (res.ok) {
                setStatus("Название успешно изменено");
            } else {
                setStatus(data.detail || "Не удалось изменить название", true);
            }
        };

        document.getElementById("delete-btn").onclick = async () => {
            if (!confirm("Удалить организацию?")) return;
            const res = await fetch(`/api/v1/org/${orgId}?user_id=${tgId}`, { method: "DELETE" });
            if (res.ok) {
                window.location.href = "/orgs";
            } else {
                const data = await res.json();
                setStatus(data.detail || "Не удалось удалить организацию", true);
            }
        };
        document.getElementById("back-btn").onclick = () => window.location.href = `/app/org_dashboard.html?org_id=${orgId}`;
        loadOrg();
    </script>
</body>
</html>
