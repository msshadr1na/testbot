<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки организации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; color: #1f1f35; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; min-height: 100vh; padding: 18px 14px 112px; }
        .title { text-align: center; font-size: 24px; margin-bottom: 14px; text-transform: uppercase; }
        .panel { background: #EFEEFC; border-radius: 20px; border: 1px solid #fff; box-shadow: 0 12px 20px rgba(37, 27, 76, 0.15); padding: 18px; }
        input { width: 100%; height: 56px; border-radius: 16px; border: 1px solid #ddd; padding: 0 12px; font-family: inherit; margin-bottom: 10px; }
        .btn { width: 100%; height: 56px; border: none; border-radius: 16px; font-family: inherit; cursor: pointer; margin-top: 8px; box-shadow: 0 7px 0 rgba(57,42,103,.18), 0 12px 18px rgba(57,42,103,.12); }
        .btn:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(57,42,103,.18), 0 8px 10px rgba(57,42,103,.12); }
        .status { width: 100%; min-height: 20px; font-size: 13px; margin-top: 10px; color: #5a5a5a; }
        .bottom-nav-wrap { position: fixed; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); }
        .bottom-nav { width: 100%; max-width: 375px; background: rgba(239,238,252,.95); border: 1px solid #fff; border-radius: 18px; box-shadow: 0 -8px 20px rgba(37,27,76,.2); display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; padding: 8px; }
        .tab-btn { border: none; border-radius: 12px; background: transparent; min-height: 62px; font-family: inherit; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn .icon { font-size: 18px; }
        .tab-btn.active { background: #cbbafd; box-shadow: inset 0 -3px 0 rgba(53,33,102,.25); }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="title">НАСТРОЙКИ</div>
        <div class="panel">
            <input id="name-input" maxlength="100" placeholder="Новое название организации">
            <button class="btn" style="background:#CBBAFD;" id="save-btn">Сохранить название</button>
            <button class="btn" style="background:#F8CECC;" id="delete-btn">Удалить организацию</button>
            <div id="status" class="status"></div>
        </div>
    </div>
    <div class="bottom-nav-wrap">
        <div class="bottom-nav">
            <button class="tab-btn active" id="tab-edit"><span class="icon">⚙</span><span>Настройки</span></button>
            <button class="tab-btn" id="tab-places"><span class="icon">🏠</span><span>Помещения</span></button>
            <button class="tab-btn" id="tab-workers"><span class="icon">👥</span><span>Работники</span></button>
            <button class="tab-btn" id="tab-clients"><span class="icon">🧍</span><span>Клиенты</span></button>
            <button class="tab-btn" id="tab-events"><span class="icon">📅</span><span>События</span></button>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const params = new URLSearchParams(window.location.search);
        const orgId = params.get("org_id");
        const tgId = Telegram.WebApp.initDataUnsafe?.user?.id;
        const input = document.getElementById("name-input");
        const statusEl = document.getElementById("status");

        function setStatus(text, isError = false) {
            statusEl.textContent = text || "";
            statusEl.style.color = isError ? "#d32f2f" : "#5a5a5a";
        }

        async function loadOrg() {
            const res = await fetch(`/api/v1/org/${orgId}`);
            const data = await res.json();
            input.value = data.name || "";
        }

        document.getElementById("save-btn").onclick = async () => {
            const name = input.value.trim();
            if (name.length < 2) {
                setStatus("Название должно быть не короче 2 символов", true);
                return;
            }
            const res = await fetch(`/api/v1/org/${orgId}?name=${encodeURIComponent(name)}`, { method: "PUT" });
            const data = await res.json();
            if (res.ok) {
                setStatus("Название успешно изменено");
            } else {
                setStatus(data.detail || "Не удалось изменить название", true);
            }
        };

        document.getElementById("delete-btn").onclick = async () => {
            if (!confirm("Удалить организацию?")) return;
            const res = await fetch(`/api/v1/org/${orgId}?user_id=${tgId}`, { method: "DELETE" });
            if (res.ok) {
                window.location.href = "/orgs";
            } else {
                const data = await res.json();
                setStatus(data.detail || "Не удалось удалить организацию", true);
            }
        };
        function goTo(path) { window.location.href = `${path}?org_id=${orgId}`; }
        document.getElementById("tab-edit").onclick = () => goTo("/app/org_edit.html");
        document.getElementById("tab-places").onclick = () => goTo("/app/org_places.html");
        document.getElementById("tab-workers").onclick = () => goTo("/app/org_workers.html");
        document.getElementById("tab-clients").onclick = () => goTo("/app/org_clients.html");
        document.getElementById("tab-events").onclick = () => goTo("/app/org_events.html");
        loadOrg();
    </script>
</body>
</html>
