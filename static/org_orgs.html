<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выберите организацию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <pre id="log">Загрузка...</pre>

    <script>
        function log(text) {
            const logEl = document.getElementById("log");
            const now = new Date().toISOString().slice(11, 23);
            logEl.innerHTML += `\n[${now}] ${text}`;
        }

        log("✅ JS стартовал");

        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            log("✅ Telegram.WebApp доступен");
            const tg = Telegram.WebApp;
            tg.ready();
            log("✅ tg.ready() вызван");

            const user = tg.initDataUnsafe?.user;
            log("👤 User: " + JSON.stringify(user));

            if (!user) {
                log("❌ Пользователь не найден");
                document.body.innerHTML = "<h2>Не удалось получить пользователя</h2>";
                return;
            }

            log(`🆔 Отправляем user_id: ${user.id}`);

            fetch(`/api/v1/org/organizations?user_id=${user.id}`)
                .then(res => {
                    log(`📡 Статус ответа: ${res.status}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    log(`📥 Получено организаций: ${data.organizations.length}`);
                    if (data.organizations.length === 0) {
                        document.body.innerHTML = "<h2>У вас нет организаций</h2>";
                    } else {
                        let html = "<h2>Ваши организации:</h2><ul>";
                        data.organizations.forEach(org => {
                            html += `<li>${org.name}</li>`;
                        });
                        html += "</ul>";
                        document.body.innerHTML = html;
                    }
                })
                .catch(err => {
                    log(`❌ Ошибка: ${err.message}`);
                    document.body.innerHTML = `<h2>Ошибка: ${err.message}</h2>`;
                });
        } else {
            log("❌ Telegram.WebApp недоступен");
            document.body.innerHTML = "<h2>Telegram.WebApp не загружен</h2>";
        }
    </script>
</body>
</html>
