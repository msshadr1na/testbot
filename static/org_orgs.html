<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выберите организацию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Russo One', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            position: relative;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            z-index: 1;
        }

        .header-title {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
            font-weight: 400;
        }

        .org-list-container {
            background: #EFEEFC;
            border-radius: 20px 20px 0 0;
            padding: 20px 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .org-list {
            flex-grow: 1;
            padding: 0 20px;
            overflow-y: auto;
            margin-bottom: auto;
        }

        .org-btn {
            width: 100%;
            max-width: 313px;
            height: 70px;
            margin: 0 auto 8px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
            transition: all 0.25s ease;
            position: relative;
        }

            .org-btn:last-child {
                margin-bottom: 0;
            }

            .org-btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
            }

            .org-btn.white {
                background: #FFFFFF;
                border: 1px solid #E0E0E0;
            }

                .org-btn.white:hover {
                    border-color: #C0C0C0;
                    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
                }

            .org-btn:nth-child(odd):not(.white) {
                background: #CBBAFD;
            }

            .org-btn:nth-child(even):not(.white) {
                background: #CBE949;
            }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 0 10px;
            background: #EFEEFC;
            z-index: 1;
        }

        .action-btn {
            width: 313px;
            height: 56px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 18px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
            transition: all 0.2s;
        }

            .action-btn:hover {
                transform: scale(1.02);
            }

        .create-org-btn {
            background: #CBBAFD;
        }

        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 0 20px;
        }

        .nav-btn {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
            display: none; /* Скрыт по умолчанию */
        }

            .nav-btn.visible {
                display: flex; /* Показывается при пагинации */
            }

            .nav-btn:hover {
                background: #FFFFFF;
                transform: scale(1.05);
            }

        .menu-btn {
            background: #CBE949;
            width: 313px;
            height: 56px;
        }

        .footer {
            display: none;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container">
        <div class="header">
            <div class="header-title">ВЫБЕРИТЕ ОРГАНИЗАЦИЮ</div>
        </div>

        <div class="org-list-container">
            <div class="org-list" id="org-list">Загрузка...</div>

            <div class="actions">
                <button class="action-btn create-org-btn" onclick="window.location.href='/app/org_create.html'">
                    Создать организацию
                </button>
            </div>

            <div class="navigation">
                <button class="nav-btn" id="prev-page-nav">←</button>
                <button class="action-btn menu-btn" onclick="window.location.href = '/app'">
                    Меню
                </button>
                <button class="nav-btn" id="next-page-nav">→</button>
            </div>
        </div>

    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        if (!user) {
            document.getElementById("org-list").innerHTML =
                '<div style="text-align:center; padding:40px; color:#777;">Не удалось определить пользователя</div>';
        } else {
            const userId = user.id;

            fetch(`/api/v1/org/organizations?user_id=${userId}`)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    const container = document.getElementById("org-list");
                    const prevBtn = document.getElementById("prev-page-nav");
                    const nextBtn = document.getElementById("next-page-nav");

                    if (data.organizations.length === 0) {
                        container.innerHTML = `
                    <div style="
                      text-align: center;
                      padding: 40px 20px;
                      color: #555;
                      font-size: 16px;
                    ">
                      У вас нет организаций.
                    </div>
                  `;
                        return;
                    }

                    // Пагинация: 5 организаций на страницу
                    const totalOrgs = data.organizations.length;
                    const perPage = 5;
                    let currentPage = 0;

                    function renderPage(page) {
                        container.innerHTML = '';

                        const start = page * perPage;
                        const end = Math.min(start + perPage, totalOrgs);
                        const pageOrgs = data.organizations.slice(start, end);

                        pageOrgs.forEach((org, index) => {
                            const btn = document.createElement("button");
                            btn.className = "org-btn";

                            // Присваиваем класс white для каждой 3-й кнопки (начиная с 3-й)
                            if ((start + index + 1) % 3 === 0) {
                                btn.classList.add('white');
                            }

                            btn.textContent = org.name.toUpperCase();

                            btn.onclick = () => {
                                localStorage.setItem("selectedOrgId", org.id);
                                window.location.href = `/app/org_dashboard.html?org_id=${org.id}&v=2`;
                            };

                            container.appendChild(btn);
                        });

                        const hasPrev = page > 0;
                        const hasNext = page < Math.ceil(totalOrgs / perPage) - 1;

                        // Показываем стрелки только когда они реально нужны
                        prevBtn.classList.toggle('visible', hasPrev);
                        nextBtn.classList.toggle('visible', hasNext);
                    }

                    // Обработчики пагинации
                    nextBtn.onclick = () => {
                        if ((currentPage + 1) * perPage < totalOrgs) {
                            currentPage++;
                            renderPage(currentPage);
                        }
                    };

                    prevBtn.onclick = () => {
                        if (currentPage > 0) {
                            currentPage--;
                            renderPage(currentPage);
                        }
                    };

                    // Рендерим первую страницу
                    renderPage(currentPage);
                })
                .catch(err => {
                    document.getElementById("org-list").innerHTML = `
                  <div style="text-align:center; padding:40px; color:#d32f2f;">
                    Ошибка загрузки<br><small>${err.message}</small>
                  </div>
                `;
                });
        }
    </script>
</body>
</html>
