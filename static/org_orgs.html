<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выберите организацию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Russo One', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            position: relative;
            padding-top: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-title {
            font-size: 24px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
            font-weight: 400;
        }

        .debug-info {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            z-index: 9999;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
        }

        .org-list-container {
            background: #EFEEFC;
            border-radius: 20px 20px 20px 20px;
            padding: 20px 0;
        }

        .org-btn {
            width: 313px;
            height: 70px;
            margin: 0 auto;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            line-height: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
            transition: all 0.25s ease;
            position: relative;
        }

            .org-btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
            }

            .org-btn:nth-child(4n) {
                background: #FFFFFF;
                border: 1px solid #E0E0E0;
            }

                .org-btn:nth-child(4n):hover {
                    border-color: #C0C0C0;
                    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
                }

            .org-btn:not(:last-child) {
                margin-bottom: 0;
            }

            .org-btn:nth-child(odd):not(.org-btn:nth-child(4n)) {
                background: #CBBAFD;
            }

            .org-btn:nth-child(even):not(.org-btn:nth-child(4n)) {
                background: #CBE949;
            }

        .pagination {
            display: flex;
            justify-content: space-between;
            width: 313px;
            margin: 40px auto 0;
        }

        .pag-btn {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

            .pag-btn:hover {
                background: #FFFFFF;
                transform: scale(1.05);
            }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="debug-info" id="debug-log">Логи: загрузка...</div>

    <div class="bg-gradient"></div>

    <div class="container">
        <div class="header">
            <div class="header-title">ВЫБЕРИТЕ ОРГАНИЗАЦИЮ</div>
        </div>

        <div class="org-list-container">
            <div id="org-list">Загрузка...</div>
        </div>

        <div class="pagination">
            <button class="pag-btn" onclick="alert('Предыдущая страница')">←</button>
            <button class="pag-btn" onclick="alert('Следующая страница')">→</button>
        </div>

        <div class="footer">
            © mmmBot 2026
        </div>
    </div>

    <script>
        function log(text) {
            const debugEl = document.getElementById("debug-log");
            const now = new Date().toISOString().slice(11, 23); // HH:mm:ss.SSS
            debugEl.innerHTML += `[${now}] ${text}\n`;
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        log("✅ org_orgs.html загружен");

        const tg = Telegram.WebApp;
        tg.ready();
        log("✅ Telegram WebApp ready");

        const user = tg.initDataUnsafe?.user;
        log("👤 User from Telegram: " + JSON.stringify(user));

        if (!user) {
            log("❌ Не удалось определить пользователя из Telegram");
            document.getElementById("org-list").innerHTML =
                '<div style="text-align:center; padding:40px; color:#777;">Не удалось определить пользователя</div>';
            return;
        }

        const userId = user.id;
        log("🆔 Отправляем user_id: " + userId);

        fetch(`/api/v1/org/organizations?user_id=${userId}`)
            .then(res => {
                log("📡 Ответ от API: статус " + res.status);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                log("📥 Получены данные: " + JSON.stringify(data));
                const container = document.getElementById("org-list");

                if (data.organizations.length === 0) {
                    log("⚠️ У пользователя нет организаций");
                    container.innerHTML = `
                <div style="
                  text-align: center;
                  padding: 40px 20px;
                  color: #555;
                  font-size: 16px;
                ">
                  У вас нет организаций.<br>
                  <button onclick="alert('Создать новую организацию')"
                          style="
                            margin-top: 16px;
                            padding: 12px 24px;
                            background: #CBBAFD;
                            border: none;
                            border-radius: 20px;
                            color: #000;
                            font-family: 'Russo One', sans-serif;
                            font-size: 16px;
                            cursor: pointer;
                          ">
                    Создать новую
                  </button>
                </div>
              `;
                    return;
                }

                log("✅ Отображаем " + data.organizations.length + " организаций");

                data.organizations.forEach((org, index) => {
                    const btn = document.createElement("button");
                    btn.className = "org-btn";
                    btn.textContent = org.name.toUpperCase();

                    if ((index + 1) % 4 === 0) {
                        btn.style.background = "#FFFFFF";
                        btn.style.border = "1px solid #E0E0E0";
                    } else if (index % 2 === 0) {
                        btn.style.background = "#CBBAFD";
                    } else {
                        btn.style.background = "#CBE949";
                    }

                    btn.onclick = () => {
                        localStorage.setItem("selectedOrgId", org.id);
                        log("✅ Выбрана организация: " + org.name + " (id: " + org.id + ")");
                        alert(`Выбрана: ${org.name}`);
                    };

                    container.appendChild(btn);
                });
            })
            .catch(err => {
                log("❌ Ошибка: " + err.message);
                document.getElementById("org-list").innerHTML = `
              <div style="text-align:center; padding:40px; color:#d32f2f;">
                Ошибка загрузки<br><small>${err.message}</small>
              </div>
            `;
            });
    </script>
</body>
</html>
