<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Личный кабинет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; color: #1f1f35; overflow-x: hidden; }
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(120.42deg, #CBBAFD 30.38%, #CBE949 55.67%);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: -1;
        }
        .container { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh; padding: 24px 24px 80px; }
        .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .back-btn {
            border: none; background: #CBE949; width: 50px; height: 50px; border-radius: 18px;
            font-size: 30px; font-family: inherit; cursor: pointer; line-height: 1;
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 7px 0 rgba(64, 52, 96, 0.22), 0 10px 18px rgba(26, 15, 52, 0.18);
        }
        .page-title { font-size: 16px; letter-spacing: 0.6px; opacity: 0.75; line-height: 1.05; text-align: right; flex: 1; text-transform: uppercase; }
        .card {
            background: #EFEEFC;
            border-radius: 20px;
            box-shadow: 0 12px 20px rgba(38, 30, 67, 0.13);
            padding: 18px;
        }
        .field { margin-bottom: 12px; }
        label { display:block; font-size: 11px; margin-bottom: 6px; opacity: .8; text-transform: uppercase; }
        input {
            width: 100%;
            height: 52px;
            border-radius: 16px;
            border: 1px solid #d3cde8;
            padding: 0 12px;
            font-family: inherit;
            font-size: 12px;
            background: #fff;
        }
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 20px;
            font-family: inherit;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            background: #CBBAFD;
            box-shadow: 0 6px 0 #9B7FCC;
        }
        .status { margin-top: 10px; font-size: 12px; min-height: 16px; text-align: center; color: #5a5a5a; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="topbar">
            <button class="back-btn" id="backBtn">←</button>
            <div class="page-title">ЛИЧНЫЙ КАБИНЕТ</div>
        </div>
        <div class="card">
            <div class="field">
                <label>Имя</label>
                <input id="firstName" maxlength="50" placeholder="Имя">
            </div>
            <div class="field">
                <label>Фамилия</label>
                <input id="lastName" maxlength="50" placeholder="Фамилия">
            </div>
            <div class="field">
                <label>Отчество</label>
                <input id="middleName" maxlength="50" placeholder="Отчество (необязательно)">
            </div>
            <div class="field">
                <label>Телефон</label>
                <input id="phone" maxlength="20" placeholder="+79990000000">
            </div>
            <button class="btn" id="saveBtn">Сохранить</button>
            <div class="status" id="status"></div>
        </div>
    </div>
    <script>
        if (window.Telegram && window.Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
        const params = new URLSearchParams(window.location.search);

        function getUserId() {
            const fromTelegram = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
            const fromQuery = params.get("user_id");
            const fromStorage = localStorage.getItem("tgUserId");
            const resolved = fromTelegram || fromQuery || fromStorage;
            if (resolved) localStorage.setItem("tgUserId", String(resolved));
            return resolved ? Number(resolved) : null;
        }
        const userId = getUserId();

        const statusEl = document.getElementById("status");
        function setStatus(t, isError=false) {
            statusEl.textContent = t || "";
            statusEl.style.color = isError ? "#d32f2f" : "#5a5a5a";
        }

        function normalizePhone(p) {
            return (p || "").trim().replace(/\s+/g, "");
        }

        async function loadProfile() {
            if (!userId) { setStatus("Не удалось определить пользователя", true); return; }
            const res = await fetch(`/api/v1/me/profile?user_id=${userId}`);
            const data = await res.json().catch(() => ({}));
            if (!res.ok) { setStatus(data.detail || "Не удалось загрузить профиль", true); return; }
            document.getElementById("firstName").value = data.first_name || "";
            document.getElementById("lastName").value = data.last_name || "";
            document.getElementById("middleName").value = data.middle_name || "";
            document.getElementById("phone").value = data.phone || "";
        }

        async function saveProfile() {
            if (!userId) return setStatus("Не удалось определить пользователя", true);
            const firstName = document.getElementById("firstName").value.trim();
            const lastName = document.getElementById("lastName").value.trim();
            const middleName = document.getElementById("middleName").value.trim();
            const phone = normalizePhone(document.getElementById("phone").value);

            if (firstName.length < 2) return setStatus("Имя должно быть не короче 2 символов", true);
            if (lastName.length < 2) return setStatus("Фамилия должна быть не короче 2 символов", true);
            if (phone && phone.length < 5) return setStatus("Телефон слишком короткий", true);

            const res = await fetch(`/api/v1/me/profile?user_id=${userId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    first_name: firstName,
                    last_name: lastName,
                    middle_name: middleName || null,
                    phone: phone || null
                })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) return setStatus(data.detail || "Не удалось сохранить", true);
            setStatus("Данные успешно сохранены");
        }

        document.getElementById("backBtn").onclick = () => window.location.href = "/app";
        document.getElementById("saveBtn").onclick = saveProfile;
        loadProfile();
    </script>
</body>
</html>
